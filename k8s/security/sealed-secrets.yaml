# ==============================================================================
# SEALED SECRETS
# Quản lý bí mật (secrets) an toàn trong Git với Sealed Secrets.
#
# ╔══════════════════════════════════════════════════════════════════════════╗
# ║             TẠI SAO DÙNG SEALED SECRETS THAY VÌ K8S SECRETS?          ║
# ║                                                                        ║
# ║  Kubernetes Secrets có nhiều VẤN ĐỀ BẢO MẬT:                         ║
# ║                                                                        ║
# ║  1. KHÔNG MÃ HÓA THỰC SỰ:                                            ║
# ║     K8s Secrets chỉ encode base64, KHÔNG mã hóa.                      ║
# ║     Bất kỳ ai có quyền đọc Secret đều thấy giá trị gốc.              ║
# ║     → echo "cGFzc3dvcmQ=" | base64 -d → "password"                   ║
# ║                                                                        ║
# ║  2. KHÔNG THỂ LƯU TRONG GIT:                                         ║
# ║     K8s Secrets chứa giá trị nhạy cảm dạng base64                     ║
# ║     → Lưu vào Git = lộ mật khẩu/khóa cho mọi người có access repo    ║
# ║     → Vi phạm nguyên tắc GitOps vì phải quản lý Secret ngoài Git      ║
# ║                                                                        ║
# ║  3. KHÔNG CÓ ACCESS CONTROL CHI TIẾT:                                 ║
# ║     Ai có quyền đọc Secret trong namespace → đọc TẤT CẢ Secret       ║
# ║                                                                        ║
# ║  SEALED SECRETS GIẢI QUYẾT CÁC VẤN ĐỀ NÀY:                          ║
# ║                                                                        ║
# ║  ✅ Mã hóa bất đối xứng (asymmetric encryption):                      ║
# ║     - Mã hóa bằng khóa công khai (public key) → ai cũng có thể mã hóa║
# ║     - Giải mã bằng khóa bí mật (private key) → chỉ controller có     ║
# ║                                                                        ║
# ║  ✅ An toàn lưu trong Git:                                             ║
# ║     - SealedSecret resource chứa dữ liệu đã mã hóa                   ║
# ║     - Có thể commit vào Git mà không sợ lộ                            ║
# ║     - Tuân thủ GitOps: mọi thứ trong Git, kể cả secrets               ║
# ║                                                                        ║
# ║  ✅ Chỉ controller giải mã:                                            ║
# ║     - Sealed Secrets controller chạy trong cluster                      ║
# ║     - Tự động giải mã SealedSecret → tạo Kubernetes Secret bình thường║
# ║     - Private key của controller được bảo vệ bởi K8s RBAC             ║
# ║                                                                        ║
# ║  QUY TRÌNH:                                                            ║
# ║  Developer → kubeseal (mã hóa) → SealedSecret → Git → ArgoCD/Flux    ║
# ║  → Sealed Secrets Controller (giải mã) → Kubernetes Secret → Pod      ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# LƯU Ý QUAN TRỌNG:
# Các giá trị "encryptedData" trong file này là PLACEHOLDER.
# Trong thực tế, bạn cần dùng lệnh kubeseal để mã hóa:
#
#   echo -n "my-password" | kubeseal --raw \
#     --namespace payment-system \
#     --name db-credentials \
#     --from-file=/dev/stdin
#
# Kết quả là chuỗi mã hóa dài, chỉ Sealed Secrets controller mới giải mã được.
# ==============================================================================

---
# ==============================================================================
# SEALED SECRET 1: DATABASE CREDENTIALS
# Thông tin đăng nhập PostgreSQL (username + password).
#
# Tại sao cần mã hóa?
# - Mật khẩu DB là thông tin CỰC KỲ NHẠY CẢM
# - Nếu lộ, kẻ tấn công có thể truy cập trực tiếp vào DB
# - Trong PCI DSS: mật khẩu phải được bảo vệ bằng mã hóa mạnh
# ==============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: db-credentials
  namespace: payment-system
  labels:
    app: postgres
    secret-type: database-credentials
  annotations:
    # Ghi chú thời điểm tạo/cập nhật secret
    sealedsecrets.bitnami.com/managed: "true"
    description: "Thông tin đăng nhập PostgreSQL - được mã hóa bởi Sealed Secrets"
spec:
  encryptedData:
    # ========================================================================
    # PLACEHOLDER - Thay thế bằng giá trị mã hóa thực tế từ kubeseal
    #
    # Lệnh mã hóa username:
    #   echo -n "payment_admin" | kubeseal --raw \
    #     --namespace payment-system --name db-credentials
    #
    # Lệnh mã hóa password:
    #   openssl rand -base64 32 | kubeseal --raw \
    #     --namespace payment-system --name db-credentials
    # ========================================================================
    username: AgBzN3K1cZ... # ← Thay bằng giá trị mã hóa thực tế
    password: AgCJ8mP2xY... # ← Thay bằng giá trị mã hóa thực tế
  template:
    metadata:
      name: db-credentials
      namespace: payment-system
      labels:
        app: postgres
        secret-type: database-credentials
    # Loại Secret được tạo ra sau khi giải mã
    type: Opaque

---
# ==============================================================================
# SEALED SECRET 2: JWT SIGNING KEYS
# Cặp khóa RSA để ký (sign) và xác minh (verify) JWT token.
#
# Tại sao dùng RSA (bất đối xứng) thay vì HMAC (đối xứng)?
#
# 1. SEPARATION OF CONCERNS:
#    - Auth Service giữ PRIVATE KEY → dùng để KÝ token
#    - Gateway + Payment Service giữ PUBLIC KEY → dùng để XÁC MINH token
#    - Nếu Gateway bị compromise → kẻ tấn công chỉ có public key
#      → KHÔNG THỂ tạo token giả (cần private key mới ký được)
#
# 2. HMAC (HS256) có rủi ro:
#    - Cùng 1 secret key dùng cho cả ký và xác minh
#    - Mọi service cần xác minh đều phải có secret key
#    - 1 service bị compromise → kẻ tấn công tạo được token giả
#
# 3. RSA (RS256) an toàn hơn:
#    - Private key chỉ ở Auth Service (1 nơi duy nhất)
#    - Public key có thể phân phối rộng rãi mà không ảnh hưởng bảo mật
#    - Phù hợp với kiến trúc microservice
#
# Cách tạo cặp khóa RSA:
#   openssl genrsa -out private.pem 4096
#   openssl rsa -in private.pem -pubout -out public.pem
# ==============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: jwt-keys
  namespace: payment-system
  labels:
    app: auth-service
    secret-type: jwt-signing-keys
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
    description: "Cặp khóa RSA cho JWT - private key chỉ Auth Service được dùng"
spec:
  encryptedData:
    # ========================================================================
    # PLACEHOLDER - Thay bằng giá trị mã hóa thực tế
    #
    # Mã hóa private key:
    #   kubeseal --raw --namespace payment-system --name jwt-keys \
    #     --from-file=private.pem
    #
    # Mã hóa public key:
    #   kubeseal --raw --namespace payment-system --name jwt-keys \
    #     --from-file=public.pem
    # ========================================================================
    private.pem: AgBHy7Kx... # ← Khóa bí mật RSA (chỉ Auth Service đọc được)
    public.pem: AgDpQ2Wm...  # ← Khóa công khai RSA (Gateway + Payment đọc được)
  template:
    metadata:
      name: jwt-keys
      namespace: payment-system
      labels:
        app: auth-service
        secret-type: jwt-signing-keys
    type: Opaque

---
# ==============================================================================
# SEALED SECRET 3: AES-256 ENCRYPTION KEY
# Khóa mã hóa AES-256 cho Payment Service.
#
# Dùng để mã hóa dữ liệu thanh toán nhạy cảm trước khi lưu vào DB:
# - Số thẻ tín dụng (PAN - Primary Account Number)
# - CVV (Card Verification Value)
# - Thông tin cá nhân chủ thẻ (Cardholder Data)
#
# AES-256 được chọn vì:
# 1. Được NIST chứng nhận (FIPS 197) - tiêu chuẩn mã hóa của chính phủ Mỹ
# 2. Độ dài khóa 256-bit → brute force không khả thi
#    (2^256 khả năng ≈ tuổi vũ trụ × hàng tỷ lần)
# 3. Tuân thủ PCI DSS Requirement 3.4: "Render PAN unreadable anywhere it is stored"
# 4. Hiệu suất cao nhờ hardware acceleration (AES-NI instruction set)
#
# Cách tạo khóa AES-256 ngẫu nhiên:
#   openssl rand -base64 32 > aes-key
#
# CẢNH BÁO: Nếu mất khóa này → KHÔNG THỂ giải mã dữ liệu thanh toán!
# → Cần backup khóa an toàn (HSM, Vault, etc.)
# ==============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: payment-encryption-keys
  namespace: payment-system
  labels:
    app: payment-service
    secret-type: encryption-keys
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
    description: "Khóa AES-256 cho mã hóa dữ liệu thanh toán - CRITICAL SECRET"
    # Đánh dấu đây là secret CỰC KỲ QUAN TRỌNG
    criticality: "high"
spec:
  encryptedData:
    # ========================================================================
    # PLACEHOLDER - Thay bằng giá trị mã hóa thực tế
    #
    # Tạo khóa AES-256 và mã hóa bằng kubeseal:
    #   openssl rand -base64 32 | kubeseal --raw \
    #     --namespace payment-system --name payment-encryption-keys
    # ========================================================================
    aes-key: AgCKx9Rt... # ← Khóa AES-256 (32 bytes = 256 bits)
  template:
    metadata:
      name: payment-encryption-keys
      namespace: payment-system
      labels:
        app: payment-service
        secret-type: encryption-keys
    type: Opaque
