# ==============================================================================
# INGRESS - Điểm vào duy nhất từ bên ngoài
# Cấu hình Ingress cho API Gateway với TLS termination.
#
# Ingress đóng vai trò:
# 1. TLS TERMINATION: Giải mã HTTPS tại Ingress, chuyển HTTP vào cluster
#    → Giảm tải mã hóa cho các service bên trong
#    → Certificate được quản lý tập trung tại Ingress
#
# 2. PATH-BASED ROUTING: Điều hướng request dựa trên đường dẫn
#    → Mọi request /api/* đều đi qua API Gateway
#    → API Gateway tiếp tục proxy đến service tương ứng
#
# 3. SINGLE ENTRY POINT: Chỉ có 1 điểm vào từ Internet
#    → Giảm bề mặt tấn công (attack surface)
#    → Tập trung bảo mật tại 1 điểm
#
# 4. WAF INTEGRATION: Có thể tích hợp Web Application Firewall
#    → Chặn SQL Injection, XSS, etc. trước khi đến Gateway
#
# Sơ đồ luồng:
#   Internet → [TLS] → Ingress Controller → [HTTP] → API Gateway → Services
# ==============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payment-system-ingress
  namespace: payment-system
  labels:
    app: payment-system
    tier: ingress
  annotations:
    # ========================================================================
    # NGINX Ingress Controller Annotations
    # Cấu hình bảo mật cho NGINX Ingress Controller
    # ========================================================================

    # Chỉ định Ingress class - dùng NGINX Ingress Controller
    kubernetes.io/ingress.class: nginx

    # ========================================================================
    # SSL/TLS Configuration
    # Cấu hình mã hóa HTTPS
    # ========================================================================

    # Bắt buộc chuyển hướng HTTP → HTTPS
    # Mọi request HTTP sẽ được redirect 301 sang HTTPS
    # Đảm bảo dữ liệu luôn được mã hóa khi truyền (Encryption in Transit)
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

    # Bắt buộc sử dụng HTTPS
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Chỉ cho phép TLS 1.2 và 1.3 - CHẶN TLS 1.0 và 1.1 (có lỗ hổng)
    # TLS 1.0/1.1 có các lỗ hổng đã biết: BEAST, POODLE, etc.
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"

    # Cipher suites mạnh - ưu tiên Forward Secrecy
    # Forward Secrecy đảm bảo: nếu private key bị lộ trong tương lai,
    # các phiên trước đó vẫn an toàn (không thể giải mã retroactively)
    nginx.ingress.kubernetes.io/ssl-ciphers: "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305"

    # Ưu tiên cipher suite của server thay vì client
    # Tránh client yêu cầu cipher yếu
    nginx.ingress.kubernetes.io/ssl-prefer-server-ciphers: "true"

    # ========================================================================
    # Security Headers
    # Các header bảo mật bổ sung tại Ingress level
    # ========================================================================

    # HSTS - Bắt buộc trình duyệt chỉ dùng HTTPS trong 1 năm
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
    nginx.ingress.kubernetes.io/hsts-preload: "true"

    # ========================================================================
    # Rate Limiting tại Ingress Level
    # Lớp giới hạn tốc độ ĐẦU TIÊN - trước cả API Gateway
    # ========================================================================

    # Giới hạn số request/giây từ 1 IP
    nginx.ingress.kubernetes.io/limit-rps: "20"

    # Giới hạn số kết nối đồng thời từ 1 IP
    nginx.ingress.kubernetes.io/limit-connections: "10"

    # ========================================================================
    # Request Size Limit
    # Giới hạn kích thước request để chống Large Payload Attack
    # ========================================================================
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"

    # ========================================================================
    # Timeout Configuration
    # Cấu hình timeout để tránh giữ kết nối quá lâu (Slowloris Attack)
    # ========================================================================
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"

    # ========================================================================
    # Let's Encrypt / cert-manager
    # Tự động cấp và gia hạn chứng chỉ SSL/TLS miễn phí
    # ========================================================================
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

spec:
  # ========================================================================
  # TLS CONFIGURATION
  # Cấu hình chứng chỉ SSL/TLS cho HTTPS.
  #
  # Chứng chỉ được quản lý bởi cert-manager:
  # 1. cert-manager tự động yêu cầu chứng chỉ từ Let's Encrypt
  # 2. Chứng chỉ được lưu trong Kubernetes Secret
  # 3. cert-manager tự động gia hạn trước khi hết hạn
  # ========================================================================
  tls:
    - hosts:
        # Domain chính của hệ thống thanh toán
        - api.payment-system.example.com
      # Secret chứa chứng chỉ TLS (tự động tạo bởi cert-manager)
      secretName: payment-system-tls

  # ========================================================================
  # INGRESS RULES
  # Quy tắc điều hướng dựa trên hostname và path.
  #
  # Tất cả request đi qua API Gateway - Single Entry Point.
  # Gateway sẽ tiếp tục proxy đến service tương ứng.
  # ========================================================================
  rules:
    - host: api.payment-system.example.com
      http:
        paths:
          # Route /api/* → API Gateway
          # Gateway sẽ xử lý routing nội bộ:
          #   /api/auth/*     → Auth Service
          #   /api/payments/* → Payment Service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway-svc
                port:
                  number: 3000

          # Route /health → API Gateway health check
          # Dùng cho external monitoring (uptime checker, etc.)
          - path: /health
            pathType: Exact
            backend:
              service:
                name: api-gateway-svc
                port:
                  number: 3000
